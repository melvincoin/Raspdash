<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">ACT active icon</title>
  <desc id="desc">Dashboard icon showing Active Cylinder Technology active with two cylinders enabled and two disabled.</desc>
  <defs>
    <linearGradient id="activeGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#76ff9f"/>
      <stop offset="1" stop-color="#11b86b"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="64" cy="64" r="58" fill="#0b1117" stroke="#23303a" stroke-width="4"/>
  <path d="M23 86c9 14 24 23 41 23s32-9 41-23" fill="none" stroke="#17232d" stroke-width="8" stroke-linecap="round"/>

  <g transform="translate(24 31)">
    <g opacity=".42">
      <rect x="0" y="9" width="15" height="44" rx="5" fill="#24313b" stroke="#6f7e88" stroke-width="2"/>
      <path d="M3.5 17h8M3.5 44h8" stroke="#8b98a1" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g filter="url(#softGlow)">
      <rect x="22" y="3" width="15" height="56" rx="5" fill="url(#activeGlow)" stroke="#bcffd1" stroke-width="2"/>
      <path d="M25.5 13h8M25.5 49h8" stroke="#063d28" stroke-width="2" stroke-linecap="round" opacity=".8"/>
    </g>
    <g filter="url(#softGlow)">
      <rect x="44" y="3" width="15" height="56" rx="5" fill="url(#activeGlow)" stroke="#bcffd1" stroke-width="2"/>
      <path d="M47.5 13h8M47.5 49h8" stroke="#063d28" stroke-width="2" stroke-linecap="round" opacity=".8"/>
    </g>
    <g opacity=".42">
      <rect x="66" y="9" width="15" height="44" rx="5" fill="#24313b" stroke="#6f7e88" stroke-width="2"/>
      <path d="M69.5 17h8M69.5 44h8" stroke="#8b98a1" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <path d="M29 70h70" stroke="#3b4b56" stroke-width="4" stroke-linecap="round"/>
  <path d="M38 70h52" stroke="#17d778" stroke-width="3" stroke-linecap="round" opacity=".9"/>

  <text x="64" y="99"
        text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="23"
        font-weight="700"
        letter-spacing="1.5"
        fill="#e7f4ee">ACT</text>
  <circle cx="101" cy="29" r="8" fill="#17d778" filter="url(#softGlow)"/>
  <path d="M97 29l3 3 5-6" fill="none" stroke="#052817" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
